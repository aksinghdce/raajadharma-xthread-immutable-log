  requested_by: M005
  requested_at: '2026-04-24T20:49:16.300951+00:00'
  reason: 'यह श्लोक भी **महाभारत** के **वन पर्व (अरण्यक पर्व)** के २९वें अध्याय से
    है। पिछले श्लोक में युधिष्ठिर ने क्रोध को ''भवाभव'' (उत्थान-पतन) का कारण बताया
    था, और इस श्लोक में वे समझा रहे हैं कि क्रोध मनुष्य की कार्यक्षमता और उसके वास्तविक
    ''तेज'' को कैसे नष्ट कर देता है।


    युधिष्ठिर का तर्क बड़ा ही व्यावहारिक है—वे कहते हैं कि जिसे हम अक्सर ''तेजस्वी''
    होने का लक्षण समझते हैं, वह क्रोधित व्यक्ति में कभी टिक नहीं सकता।


    | पद | संधि विच्छेद | मूल संरचना (धातु + उपसर्ग + प्रत्यय) + पाणिनि सूत्र | निरुक्त
    व्याख्या | हिंदी अर्थ | समग्र सूत्रार्थ |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | **दाक्ष्यं** | दाक्ष्यम् | दक्ष् (वृद्धौ/शौचे) + ष्यञ् – पाणिनि ५.१.१२४ | दक्षस्य
    भावः दाक्ष्यम् | कुशलता / निपुणता | निपुणता, सहनशीलता (अमर्ष), वीरता और शीघ्रता—ये
    ''तेज'' के गुण हैं। |

    | **ह्यमर्षः** | हि + अमर्षः | हि (अव्यय) + [नञ् + मृष् (सहन) + घञ्] – ३.३.१८
    | न मृष्यते इति अमर्षः (अक्षमा/तेज) | निश्चय ही अमर्ष (अन्याय न सहना) | |

    | **शौर्यं** | शौर्यम् | शूर (विक्रमे) + ष्यञ् – पाणिनि ५.१.१२४ | शूरस्य भावः
    शौर्यम् | वीरता / पराक्रम | |

    | **शीघ्रत्वम्** | शीघ्रत्वम् | शीघ्र + त्व – पाणिनि ५.१.११९ | शीघ्रस्य भावः शीघ्रत्वम्
    | फुर्ती / तत्परता | |

    | **तेजसः** | तेजसः | तिज् (निशाने/दीप्तौ) + असुन् – उणादि ४.१३० | तेज्यते अनेन
    इति तेजः | तेज के (Of Brilliance) | क्रोध से दबे हुए (क्रोधित) व्यक्ति के द्वारा
    इन गुणों को आसानी से प्राप्त करना संभव नहीं है। |

    | **क्रोधाभिभूतेन** | क्रोध + अभिभूतेन | क्रोध + [अभि + भू + क्त] – ३.२.१०२ |
    क्रोधेन अभिभूतः (तृतीया तत्पुरुष) | क्रोध से पराजित/दबा हुआ | |

    | **अञ्जसा** | अञ्जसा | अञ्जू (व्यक्तिमर्क्षणकान्तिषु) + असुन् | अञ्जसा (अव्यय
    रूप) | सरलता से / तुरंत | |

    | **शक्याः** | शक्याः | शक् (शक्तौ) + यत् – पाणिनि ३.१.९७ | शक्यते इति शक्यः |
    समर्थ / संभव | |


    ---


    ### दार्शनिक विश्लेषण: क्रोध और ''तेज'' का द्वंद्व


    युधिष्ठिर यहाँ द्रौपदी को यह समझा रहे हैं कि एक क्षत्रिय के लिए जो **''तेज''**
    अनिवार्य है, वह क्रोध (Anger) नहीं है। लोग अक्सर गुस्से को तेज समझ लेते हैं, जबकि
    युधिष्ठिर के अनुसार तेज के चार स्तंभ हैं:


    1.  **दाक्ष्यं (Efficiency):** काम को कुशलता से करना। क्रोधी व्यक्ति का हाथ काँपता
    है और निर्णय गलत होते हैं।

    2.  **अमर्षः (Righteous Indignation):** यह वह ऊर्जा है जो अन्याय को देखकर जागती
    है, पर इसमें विवेक (Wisdom) साथ होता है।

